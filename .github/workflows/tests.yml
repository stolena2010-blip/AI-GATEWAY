name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run tests
        run: |
          python -c "import sys; print(f'Python {sys.version}')"
          python -c "import cv2; print(f'cv2 OK: {cv2.__version__}')" || echo "cv2 import FAILED"
          python -c "import PIL; print(f'PIL OK: {PIL.__version__}')" || echo "PIL import FAILED"
          set +e
          python -m pytest tests/ -v --tb=long 2>&1 | tee test_output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $TEST_EXIT
        env:
          AZURE_OPENAI_ENDPOINT: "https://dummy.openai.azure.com/"
          AZURE_OPENAI_API_KEY: "dummy-key-for-tests"
          AZURE_OPENAI_DEPLOYMENT: "gpt-4o-vision"
          AZURE_OPENAI_API_VERSION: "2024-12-01-preview"
